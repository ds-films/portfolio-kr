<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연락처 | DP.PORTFOLIO KR</title>
    <meta name="description" content="도미닉 슈스케비치에게 문의하세요. 촬영 의뢰 및 협업 제안을 위해 양식을 작성하거나 직접 연락 주시기 바랍니다.">
    <meta name="keywords" content="연락처, 사진작가 문의, 촬영 의뢰, 카우나스, 리투아니아, 포트폴리오">
    <meta name="author" content="Dominik Šuškevič, Dominikphotofficial">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kr.dominikphotofficial.lt/contacts.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://iili.io/fjNLbs4.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "DP.PORTFOLIO Contact",
      "description": "Contact page for Dominik Šuškevič Photography",
      "url": "https://kr.dominikphotofficial.lt/contacts.html"
    }
    </script>
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    
    <header id="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="https://iili.io/fjNLbs4.png" alt="DP.PORTFOLIO Logo">
                </a>
            </div>
            <div class="burger" id="burger-toggle">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </header>

    <div class="nav-menu" id="nav-overlay">
        <div class="nav-links">
            <a href="index.html" class="nav-link">작품</a>
            <a href="services.html" class="nav-link">서비스</a>
            <a href="biography.html" class="nav-link">약력</a>
            <a href="about.html" class="nav-link">정보</a>
            <a href="contacts.html" class="nav-link active">연락처</a>
        </div>
    </div>
    
    <main class="container fade-in-up" style="padding-top: 160px; padding-bottom: 100px;">
        <h1 class="section-title">문의하기</h1>
        
        <div class="contact-grid">
            <div class="info-card">
                <div class="info-group">
                    <span class="info-label">이메일</span>
                    <a href="mailto:Dominikphotofficial.lt@gmail.com" class="info-value">Dominikphotofficial.lt@gmail.com</a>
                </div>
                <div class="divider"></div>
                <div class="info-group">
                    <span class="info-label">연락처</span>
                    <a href="tel:+37062337615" class="info-value">+370 623 37615</a>
                </div>
                <div class="divider"></div>
                <div class="info-group">
                    <span class="info-label">지역</span>
                    <span class="info-value">카우나스 / 슈벤초넬라이</span>
                </div>
            </div>

            <div class="form-card">
                <h3 class="form-title">온라인 문의</h3>
                <form action="https://formspree.io/f/mgvnbvaw" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">성함</label>
                        <input type="text" id="name" name="name" required placeholder="성함을 입력해 주세요">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="email" required placeholder="답변받으실 이메일">
                    </div>
                    <div class="form-group">
                        <label for="style">관심 서비스</label>
                        <select id="style" name="style">
                            <option value="Retro Foto">레트로 사진 촬영</option>
                            <option value="Cinematic Video">시네마틱 비디오</option>
                            <option value="Fotosesija">개인 스냅 촬영</option>
                            <option value="Kita">기타 프로젝트 문의</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="5" required placeholder="아이디어나 구체적인 계획을 설명해 주세요..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">보내기</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 DP.PORTFOLIO. 모든 권리 보유.</p>
        <div class="lang-switcher">
            <a href="https://dominikphotofficial.lt">LT</a>
            <a href="https://en.dominikphotofficial.lt">EN</a>
            <a href="https://pl.dominikphotofficial.lt">PL</a>
            <a href="https://ru.dominikphotofficial.lt">RU</a>
            <a href="https://kr.dominikphotofficial.lt" class="active">KR</a>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
